<!DOCTYPE html>
<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Jumping Game</title>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="pause-menu">PAUSED</div>
    </div>
    <div id="controls">
        <button id="btn-left">L</button>
        <button id="btn-right">R</button>
        <button id="btn-jump">J</button>
        <button id="btn-dash">D</button>
        <button id="btn-updraft">U</button>
        <button id="btn-teleport">T</button>
        <button id="btn-pause">P</button>
    </div>
    <script src="game.js"></script>
</body>
</html>
